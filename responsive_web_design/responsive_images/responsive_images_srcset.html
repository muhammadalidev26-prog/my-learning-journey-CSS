<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRCSET | Learning Responsive Web Design</title>

  <link rel="stylesheet" href="css/srcset.css">
</head>
<body>

  <h1>Responsive Image Test</h1>
  <p>Resize your browser window or use Device Toolbar in DevTools to see the image source change!</p>

  <img 
    src="https://placehold.co/800x400?text=Fallback+800px" 
    srcset="
      https://placehold.co/400x200?text=Small+400px 400w,
      https://placehold.co/800x400?text=Medium+800px 800w,
      https://placehold.co/1200x600?text=Large+1200px 1200w
    "
    sizes="(max-width: 600px) 100vw, (max-width: 1000px) 80vw, 1200px"
    alt="Responsive test image"
  >

  <!--  NOTE
  so the browser selects images automatically and we are just giving it list of images and their sizes along with how big the image should be and leaving the selecting part for browser (so browser would automatically look for image suitable for width without us writing conditions like in programming languages)
  -->

</body>
</html>
